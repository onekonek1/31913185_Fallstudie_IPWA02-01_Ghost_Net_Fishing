<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bergung übernehmen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Bergung für Netz #<span th:text="${net.id}"></span> übernehmen</h2>
    <p class="text-muted">Standort: <span th:text="${net.latitude} + ' / ' + ${net.longitude}"></span></p>

    <form th:action="@{/nets/salvage/{id}(id=${net.id})}" th:object="${salvager}" method="post" class="card p-4 shadow-sm">
        <div class="alert alert-info">
            Als bergende Person benötigen wir Ihren Namen und Ihre Telefonnummer für Rückfragen.
        </div>
        
        <div class="mb-3">
            <label class="form-label">Ihr Name:</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ihre Telefonnummer:</label>
            <input type="text" th:field="*{phoneNumber}" class="form-control" required>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Bergung ankündigen</button>
            <a th:href="@{/nets/all}" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</body>
</html>
