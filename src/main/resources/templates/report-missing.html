<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Netz als verschollen melden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Netz als verschollen melden</h2>
    <p class="text-muted">Hinweis: Verschollen-Meldungen können nicht anonym erfolgen.</p>
    
    <form th:action="@{/nets/missing/{id}(id=${netId})}" th:object="${person}" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">Ihr Name:</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ihre Telefonnummer (optional):</label>
            <input type="text" th:field="*{phoneNumber}" class="form-control">
        </div>
        <button type="submit" class="btn btn-warning">Als verschollen markieren</button>
        <a href="/nets/all" class="btn btn-secondary">Abbrechen</a>
    </form>
</body>
</html>
