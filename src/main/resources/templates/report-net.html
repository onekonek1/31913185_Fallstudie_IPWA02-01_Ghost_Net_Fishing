<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Geisternetz melden</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Neues Geisternetz melden</h2>
    <form th:action="@{/nets/report}" th:object="${ghostNet}" method="post" class="card p-4 shadow-sm">
        
        <h4>Standort & Details</h4>
        <div class="mb-3">
            <label class="form-label">Breitengrad (Latitude):</label>
            <input type="number" step="any" th:field="*{latitude}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Längengrad (Longitude):</label>
            <input type="number" step="any" th:field="*{longitude}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Geschätzte Größe (in m&sup2;):</label>
                <select th:field="*{size}" class="form-select">
                    <option value="Sehr klein">Sehr klein (unter 5 m&sup2;)</option>
                    <option value="Klein">Klein (5 - 20 m&sup2;)</option>
                    <option value="Mittel">Mittel (20 - 100 m&sup2;)</option>
                    <option value="Groß">Groß (100 - 500 m&sup2;)</option>
                    <option value="Sehr groß">Sehr groß (über 500 m&sup2;)</option>
                </select>
            <div class="form-text">Geben Sie die ungefähre Fläche an, die das Netz bedeckt.</div>
        </div>

        <hr>
        <h4>Persönliche Angaben (Optional für anonyme Meldung)</h4>
        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" th:field="*{reportingPerson.name}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Telefonnummer:</label>
            <input type="text" th:field="*{reportingPerson.phoneNumber}" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Netz melden</button>
    </form>
</body>
</html>
