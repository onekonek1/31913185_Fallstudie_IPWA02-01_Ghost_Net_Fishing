<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ghost Net Fishing - Übersicht</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .status-badge { width: 160px; display: inline-block; text-align: center; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Aktuelle Geisternetze</h1>
        <a th:href="@{/nets/report}" class="btn btn-primary">Neues Netz melden</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Standort (GPS)</th>
                        <th>Größe</th>
                        <th>Status</th>
                        <th>Bergende Person</th>
                        <th>Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="net : ${nets}">
                        <td th:text="${net.latitude} + ', ' + ${net.longitude}"></td>
                        <td th:text="${net.size}"></td>
                        
                        <td>
                            <span th:classappend="${net.status.name() == 'GEMELDET'} ? 'badge bg-info' : 
                                              (${net.status.name() == 'BERGUNG_BEVORSTEHEND'} ? 'badge bg-warning text-dark' : 
                                              (${net.status.name() == 'GEBORGEN'} ? 'badge bg-success' : 'badge bg-secondary'))"
                                  class="status-badge p-2"
                                  th:text="${net.status}">
                            </span>
                        </td>

                        <td>
                            <span th:text="${net.salvagingPerson != null} ? ${net.salvagingPerson.name} : '-'"></span>
                        </td>

                        <td>
                            <div class="btn-group" role="group">
                                <a th:if="${net.status.name() == 'GEMELDET'}" 
                                   th:href="@{/nets/salvage/{id}(id=${net.id})}" 
                                   class="btn btn-sm btn-outline-primary">Bergen</a>

                                <a th:if="${net.status.name() == 'BERGUNG_BEVORSTEHEND'}" 
                                   th:href="@{/nets/salvage/complete/{id}(id=${net.id})}" 
                                   class="btn btn-sm btn-success">Als geborgen markieren</a>

                                <a th:if="${net.status.name() != 'GEBORGEN' && net.status.name() != 'VERSCHOLLEN'}" 
                                   th:href="@{/nets/missing/{id}(id=${net.id})}" 
                                   class="btn btn-sm btn-outline-danger">Verschollen</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(nets)}" class="text-center py-4">
                <p class="text-muted">Aktuell liegen keine Meldungen über Geisternetze vor.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
