# 1. DATASOURCE KONFIGURATION (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ghostnet_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=31913185
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / HIBERNATE EINSTELLUNGEN
# update sorgt dafür, dass Hibernate die Tabellen automatisch basierend auf den Entities erstellt.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. THYMELEAF EINSTELLUNGEN
# Deaktiviert das Caching, damit Änderungen an HTML-Dateien ohne Neustart sichtbar werden.
spring.thymeleaf.cache=false

# 4. SERVER EINSTELLUNGEN
server.port=8080